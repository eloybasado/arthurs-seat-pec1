<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arthur’s Seat - Edinburgh</title>
    <link rel="stylesheet" href="./assets/styles/main.scss" />
  </head>
  <body>
    <include src="views/header.html"></include>

    <main>
      <section class="hero">
        <div class="container">
          <h2>Descubre Arthur’s Seat</h2>
          <p>Una experiencia natural en el corazón de Edimburgo</p>
        </div>
      </section>

      <section class="info">
        <div class="container">
          <h2>¿Qué es Arthur’s Seat?</h2>
          <p>
            Arthur’s Seat es una antigua formación volcánica situada en Holyrood
            Park, ofreciendo una de las mejores vistas panorámicas de la ciudad
            de Edimburgo.
          </p>
          <a href="#mapa" class="btn">
            <i class="fa-solid fa-location-dot" aria-hidden="true"></i>
            Ver ubicación
          </a>
        </div>
      </section>

      <section class="gallery container">
        <img
          src="./assets/images/gallery1.jpg"
          alt="Vista desde Arthur’s Seat"
        />
        <img src="./assets/images/gallery2.jpg" alt="Sendero hacia la cima" />
        <img src="./assets/images/gallery3.jpg" alt="Panorámica de Edimburgo" />
      </section>

      <section class="map container" id="mapa">
        <h2>Ubicación</h2>
        <iframe
          src="https://www.google.com/maps?q=Arthur%27s%20Seat%2C%20Edinburgh&output=embed"
          title="Mapa de Arthur's Seat en Edimburgo"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        >
        </iframe>
        <p class="map-link">
          <a
            href="https://www.google.com/maps/place/Arthur's+Seat/@55.9444265,-3.1612052,15z"
            target="_blank"
            rel="noopener noreferrer"
          >
            <i class="fa-solid fa-map-location-dot" aria-hidden="true"></i>
            Abrir en Google Maps
          </a>
        </p>
      </section>
    </main>

    <include src="views/footer.html"></include>
  </body>
</html>
